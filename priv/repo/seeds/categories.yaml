# Unified category taxonomy.
#
# Two levels: category → subcategory. Each subcategory carries a
# `chains` map. Each chain's value is a list of slugs from that
# chain's category tree (the third column in tmp/categories/*.txt).
#
# Slugs are stable IDs; chain categories are routed into a
# subcategory by matching their *name* (column 1 of the dumps), not
# their slug, against the unified label here. A given chain may
# contribute zero, one, or many slugs per subcategory.
#
# Lider's category tree is effectively flat (L1 → leaf), so the
# slugs listed under `lider:` are L1/L2 prefixes — the seeder is
# expected to prefix-match against chain_listings.category_paths
# rather than equality-match.

