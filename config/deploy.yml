# Kamal deploy config. Mirrors dotty_web's setup — same Kimsufi box,
# same GHCR registry, same SSH user. The differences worth noting:
#
#   * super_barato uses SQLite, not Postgres. The Repo writes to a file
#     under DATABASE_PATH, which Kamal mounts as a host volume below.
#   * Two more directories survive deploys via volumes: PRICE_LOG_DIR
#     (append-only price-history files) and per-chain curl-impersonate
#     binaries.

service: super_barato

ssh:
  user: ubuntu

image: stupendousapps/super_barato

# Same Kimsufi box that hosts dotty_web, macatlas, etc. The built-in
# Kamal proxy multiplexes services by hostname.
servers:
  web:
    hosts:
      - 51.161.116.221
    options:
      memory: 1g
      memory-reservation: 256m

# Public hostnames terminating TLS at the Kamal proxy. Adjust the
# `app_port` to match `PORT` in env.clear below.
proxy:
  ssl: true
  hosts:
    - superbarato.cl
    - www.superbarato.cl
    - admin.superbarato.cl
  app_port: 4003
  # `GET /up` returns 200 via SuperBaratoWeb.Plugs.Health, mounted
  # early in the endpoint so it bypasses the router (any host, no
  # session, no CSRF).
  healthcheck:
    path: /up
    interval: 5

registry:
  server: ghcr.io
  username: fceruti
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - SECRET_KEY_BASE
  clear:
    PHX_HOST: superbarato.cl
    PORT: "4003"
    # SQLite file lives on its own host volume (see `volumes:` below)
    # so it can be snapshotted/backed up independently of logs/prices.
    DATABASE_PATH: /data/db/super_barato.db
    # Append-only price logs persist across deploys via a host volume.
    PRICE_LOG_DIR: /data/prices
    # The release ships curl-impersonate binaries inside the image at
    # /app/lib/super_barato-*/priv/bin/, but reading them from there is
    # version-pinned to each release — overriding to a stable host path
    # makes deploys cheaper and lets us swap binaries without a rebuild.
    CURL_IMPERSONATE_DIR: /app/lib/super_barato-0.1.0/priv/bin
    # Master switch: turn the crawler pipeline on for the deployed app.
    CHAINS_ENABLED: "true"
    # Tee logs to a file alongside stdout so they survive container
    # restarts. Rotates at LOG_MAX_BYTES × LOG_MAX_FILES (defaults
    # 10 MB × 5 files = ~50 MB on disk). Uncomment below to tighten
    # or loosen retention without a rebuild.
    LOG_DIR: /data/log
    # LOG_MAX_FILES: "5"
    # LOG_MAX_BYTES: "10485760"

# Each concern gets its own bind mount so they're independently
# inspectable / backupable on the host:
#
#   * /data/db      — SQLite file + WAL/shm sidecars
#   * /data/log     — rotating app log files
#   * /data/prices  — append-only price-history logs
volumes:
  - "/data/super_barato/db:/data/db"
  - "/data/super_barato/log:/data/log"
  - "/data/super_barato/prices:/data/prices"

aliases:
  console: app exec --interactive --reuse "bin/super_barato remote"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  migrate: app exec --reuse "bin/migrate"

builder:
  arch: amd64
